<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Insert Furniture - Staff Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header">
        <h1>Furniture Catalog Management</h1>
    </div>

    <div class="navbar">
        <a href="staff_insert_item.html" class="active">Furniture Items</a>
        <a href="staff_insert_material.html">Materials</a>
        <a href="staff_update_order.html">Orders</a>
        <a href="staff_delete_item.html">Delete Items</a>
        <a href="index.html" style="float:right">Logout</a>
    </div>

    <div class="container" style="max-width: 600px;">
        <h2>Add New Furniture Product</h2>
        
        <form action="#" method="GET">
            
            <div class="form-group">
                <label>Furniture Name:</label>
                <input type="text" placeholder="e.g. Luxury Leather Sofa" required>
            </div>

            <div class="form-group">
                <label>Price (HKD):</label>
                <input type="number" step="0.01" placeholder="e.g. 4500.00" required>
            </div>

            <div class="form-group">
                <label>Description:</label>
                <textarea rows="4" placeholder="Enter product details, dimensions, and features..." required></textarea>
            </div>

            <div style="margin-top: 20px;">
                <button type="submit" class="btn btn-success" style="width: 100%; padding: 12px; font-weight: bold;">
                    Save Product (UI Test)
                </button>
            </div>

        </form>
    </div>

</body>
</html>
