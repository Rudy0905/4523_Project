<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Insert Material - Staff Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <h1>Staff Management System</h1>
    </div>
    <div class="navbar">
        <a href="staff_insert_item.html">Furniture Items</a>
        <a href="staff_insert_material.html" class="active">Materials</a>
        <a href="staff_update_order.html">Orders</a>
        <a href="staff_generate_report.html">Reports</a>
        <a href="index.html" style="float:right">Back to Hub</a>
    </div>

    <div class="container" style="max-width: 600px;">
        <h2>Add New Material Record</h2>
        <form>
            <div class="form-group">
                <label>Material Name:</label>
                <input type="text" placeholder="e.g. Oak Wood Plank" required>
            </div>
            <div class="form-group">
                <label>Current Stock Quantity (mqty):</label>
                <input type="number" value="0" required>
            </div>
            <div class="form-group">
                <label>Unit (munit):</label>
                <select>
                    <option>pcs</option>
                    <option>meter</option>
                    <option>block</option>
                </select>
            </div>
            <button type="submit" class="btn btn-success">Save Material</button>
        </form>
    </div>
</body>
</html>
