<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Premium Living Furniture</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Specific UI styles for the login box layout */
        .login-box {
            max-width: 380px; 
            margin: 80px auto;
            background: white;
            padding: 25px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        /* Compact radio selector container */
        .role-selector {
            display: flex;
            gap: 20px;
            margin-top: 6px;
            margin-bottom: 6px;
            align-items: center;
        }
        
        /* Fixed: Made the radio input dots smaller and neat */
        .role-selector input[type="radio"] {
            width: 25px;
            height: 25px;
            margin: 0;
            cursor: pointer;
        }
        
        /* Fixed: Adjusted labels for a tight, aligned fit */
        .role-selector label {
            font-size: 13px;
            font-weight: normal;
            color: #555;
            cursor: pointer;
            margin-left: -12px; /* Pull text close to its radio dot */
        }
        
        /* Single Login Button Layout */
        .login-btn-container {
            margin-top: 22px; 
        }
        
        /* Full-width single professional button style */
        .btn-login {
            width: 100%;
            padding: 10px;
            font-size: 15px;
            font-weight: bold;
            color: white;
            background-color: #2c3e50; /* Matches header theme */
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-login:hover {
            background-color: #34495e;
        }
        
        .hint-text {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 15px;
            text-align: center;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Premium Living Furniture System</h1>
    </div>

    <div class="login-box">
        <h2 style="text-align: center; color: #2c3e50; margin-top: 0; margin-bottom: 20px; font-size: 22px;">Account Login</h2>
        
        <form id="loginForm">
            <div class="form-group">
                <label style="font-size: 14px;">Select your account type:</label>
                
                <div class="role-selector">
                    <input type="radio" id="role_customer" name="role" value="customer" checked>
                    <label for="role_customer">Customer</label>
                    
                    <input type="radio" id="role_staff" name="role" value="staff">
                    <label for="role_staff">Staff / Admin</label>
                </div>
            </div>

            <div class="form-group">
                <label>User ID / Account Number:</label>
                <input type="text" placeholder="e.g. 1" required>
            </div>

            <div class="form-group">
                <label>Password:</label>
                <input type="password" placeholder="••••••••" required>
            </div>

            <div class="login-btn-container">
                <button type="button" class="btn-login" onclick="handlePrototypeLogin()">Login</button>
            </div>
        </form>

        <div class="hint-text">
            <hr style="border: 0; border-top: 1px solid #eee; margin-bottom: 12px;">
            <strong>Prototype Simulation:</strong><br>
            Toggle identity above and press "Login" to simulate routing.
        </div>
    </div>

    <script>
        function handlePrototypeLogin() {
            // Find which identity radio option is currently ticked
            var selectedRole = document.querySelector('input[name="role"]:checked').value;
            
            // Redirect based on selection
            if (selectedRole === "customer") {
                window.location.href = "customer_make_order.html";
            } else if (selectedRole === "staff") {
                window.location.href = "staff_update_order.html";
            }
        }
    </script>
</body>
</html>
