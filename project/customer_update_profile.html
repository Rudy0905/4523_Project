<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update Profile - Premium Living</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <h1>Premium Living Furniture</h1>
    </div>
    <div class="navbar">
        <a href="customer_make_order.html">Browse Furniture</a>
        <a href="customer_cart.html">My Cart</a>
        <a href="customer_view_orders.html">My Orders</a>
        <a href="customer_update_profile.html" class="active">Profile</a>
        <a href="index.html" style="float:right">Logout</a>
    </div>

    <div class="container" style="max-width: 600px;">
        <h2>My Profile</h2>
        <form id="profileForm">
            <div class="form-group">
                <label>Full Name:</label>
                <input type="text" value="Rudy" id="cname" required>
            </div>
            <div class="form-group">
                <label>Contact Number:</label>
                <input type="tel" value="98765432" id="ctel" required>
            </div>
            <div class="form-group">
                <label>Delivery Address:</label>
                <textarea rows="3" id="caddr">Room A, 10/F, VTC Tower, Wan Chai</textarea>
            </div>
            <div class="form-group">
                <label>Company (Optional):</label>
                <input type="text" value="" id="company">
            </div>
            <button type="button" class="btn btn-primary" onclick="alert('Profile Updated!')">Update Information</button>
        </form>
    </div>
</body>
</html>
