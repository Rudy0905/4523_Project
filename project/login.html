<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Premium Living Furniture</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Specific UI styles for the login box layout */
        .login-box {
            max-width: 400px;
            margin: 80px auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .role-selector {
            display: flex;
            gap: 10px;
            margin-top: 5px;
            margin-bottom: 5px;
        }
        .role-selector label {
            font-weight: normal;
            cursor: pointer;
        }
        .hint-text {
            font-size: 13px;
            color: #7f8c8d;
            margin-top: 15px;
            text-align: center;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Premium Living Furniture System</h1>
    </div>

    <div class="login-box">
        <h2 style="text-align: center; color: #2c3e50; margin-top: 0; margin-bottom: 25px;">Account Login</h2>
        
        <form action="#" method="GET">
            <div class="form-group">
                <label>Identify Yourself:</label>
                <div class="role-selector">
                    <input type="radio" id="role_customer" name="role" value="customer" checked>
                    <label for="role_customer">Customer</label>
                    
                    <input type="radio" id="role_staff" name="role" value="staff">
                    <label for="role_staff">Staff / Admin</label>
                </div>
            </div>

            <div class="form-group">
                <label>User ID / Account Number:</label>
                <input type="text" placeholder="e.g. 1" required>
            </div>

            <div class="form-group">
                <label>Password:</label>
                <input type="password" placeholder="••••••••" required>
            </div>

            <div style="margin-top: 25px; display: flex; flex-direction: column; gap: 10px;">
                <a href="customer_make_order.html" class="btn btn-success" style="text-align: center; padding: 12px; font-weight: bold;">
                    Sign In as Customer (Test)
                </a>
                <a href="index.html" class="btn btn-primary" style="text-align: center; padding: 12px; font-weight: bold;">
                    Sign In as Staff Portal (Test)
                </a>
            </div>
        </form>

        <div class="hint-text">
            <hr style="border: 0; border-top: 1px solid #eee; margin-bottom: 15px;">
            <strong>Prototype Demo Tips:</strong><br>
            Click the green button to view Customer pages.<br>
            Click the blue button to view Staff pages.
        </div>
    </div>
</body>
</html>
