<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Shopping Cart - Premium Living</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <h1>Premium Living Furniture</h1>
    </div>
    <div class="navbar">
        <a href="customer_make_order.html">Browse Furniture</a>
        <a href="customer_cart.html" class="active">My Cart (2)</a>
        <a href="customer_view_orders.html">My Orders</a>
        <a href="customer_update_profile.html">Profile</a>
        <a href="index.html" style="float:right">Logout</a>
    </div>

    <div class="container">
        <h2>Shopping Cart</h2>
        <table>
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Subtotal</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Oak Dining Chair</td>
                    <td>HKD 450.00</td>
                    <td><input type="number" value="2" style="width: 60px;"></td>
                    <td>HKD 900.00</td>
                    <td><button class="btn btn-danger">Remove</button></td>
                </tr>
                <tr>
                    <td>Large Dining Table</td>
                    <td>HKD 2,500.00</td>
                    <td><input type="number" value="1" style="width: 60px;"></td>
                    <td>HKD 2,500.00</td>
                    <td><button class="btn btn-danger">Remove</button></td>
                </tr>
            </tbody>
        </table>

        <div style="text-align: right; margin-top: 20px;">
            <h3>Total: HKD 3,400.00</h3>
            <button class="btn btn-success" onclick="alert('Order placed successfully!')">Confirm Checkout</button>
        </div>
    </div>
</body>
</html>
